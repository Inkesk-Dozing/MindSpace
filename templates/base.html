<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindSpace - {% block title %}{% endblock %}</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="ph-duotone ph-brain"></i>
                <span>MindSpace</span>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link {% if active_page == 'index' %}active{% endif %}">
                        <i class="ph-duotone ph-house"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('dashboard') }}" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                        <i class="ph-duotone ph-chart-pie-slice"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('evaluate') }}" class="nav-link {% if active_page == 'evaluate' %}active{% endif %}">
                        <i class="ph-duotone ph-crosshair"></i> Evaluation
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('compare') }}" class="nav-link {% if active_page == 'compare' %}active{% endif %}">
                        <i class="ph-duotone ph-git-diff"></i> Compare
                    </a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <span class="version-tag">v2.1 Stable</span>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
                    <i class="ph ph-moon"></i>
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1>{% block page_title %}{% endblock %}</h1>
                    <p>{% block page_subtitle %}{% endblock %}</p>
                </div>
                {% block top_actions %}{% endblock %}
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const icon = toggle.querySelector('i');
        
        function updateIcon(theme) {
            if(theme === 'dark') {
                icon.classList.remove('ph-sun');
                icon.classList.add('ph-moon');
            } else {
                icon.classList.remove('ph-moon');
                icon.classList.add('ph-sun');
            }
        }

        if (toggle) {
            const saved = localStorage.getItem('theme') || 'dark';
            updateIcon(saved);
            
            toggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                updateIcon(next);
            });
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
